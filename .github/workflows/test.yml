name: Test /time endpoint

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv
        shell: powershell
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install -r requirements.txt
          .\venv\Scripts\python.exe -m pip install requests

      - name: Run app
        shell: powershell
        run: |
          Start-Process -NoNewWindow .\venv\Scripts\python.exe -ArgumentList "src/app/app.py"
          Start-Sleep -Seconds 3

      - name: Run tests
        shell: powershell
        run: |
          .\venv\Scripts\python.exe test/test_time.py