name: Test /time endpoint

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt requests
      - name: Run app in background
        run: |
          source venv/bin/activate
          python src/app/app.py &
          sleep 2
      - name: Run test
        run: |
          source venv/bin/activate
          python test/test_time.py